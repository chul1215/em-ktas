<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM-KTAS 응급실 검사처방 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
--glass-bg:rgba(255,255,255,0.07);
--glass-bg-hover:rgba(255,255,255,0.11);
--glass-border:rgba(255,255,255,0.14);
--glass-blur:blur(20px) saturate(160%);
--glass-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
--glass-shadow-hover:0 16px 48px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.22);
--accent-blue:#5BA8FF;
--accent-cyan:#38D9F5;
--accent-purple:#A78BFA;
--accent-green:#34D399;
--accent-amber:#FBBF24;
--text-primary:rgba(255,255,255,0.92);
--text-secondary:rgba(255,255,255,0.55);
--text-muted:rgba(255,255,255,0.35);
--border-subtle:rgba(255,255,255,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060B18 url('../design/26-Tahoe-Light-6K-thumb.jpeg') center/cover fixed no-repeat;color:var(--text-primary);line-height:1.5;min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:rgba(6,11,24,0.72);z-index:0;pointer-events:none}
body::after{content:'';position:fixed;bottom:-15%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(56,217,245,0.10) 0%,transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
/* HEADER */
.header{background:rgba(6,11,24,0.7);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);color:#fff;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.3);border-bottom:1px solid var(--glass-border)}
.header-logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.hospital-switch{display:flex;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;border:1px solid var(--border-subtle)}
.hospital-switch button{padding:8px 28px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.hospital-switch button.active{background:linear-gradient(135deg,rgba(91,168,255,0.5),rgba(56,217,245,0.3));color:#fff}
.hospital-switch button:hover:not(.active){color:rgba(255,255,255,.85)}
.header-period{font-size:13px;color:rgba(255,255,255,.5)}
/* LAYOUT */
.dashboard{max-width:1440px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:24px;position:relative;z-index:1}
.row{display:grid;gap:24px}
.row-2{grid-template-columns:1fr 1fr}
.row-7-5{grid-template-columns:7fr 5fr}
.row-full{grid-template-columns:1fr}
/* CARD */
.card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:20px;box-shadow:var(--glass-shadow);padding:24px;transition:transform .3s,box-shadow .3s,background .3s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);pointer-events:none}
.card:hover{transform:translateY(-3px);box-shadow:var(--glass-shadow-hover);background:var(--glass-bg-hover)}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-cyan);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
/* KPI CARDS */
.kpi-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.kpi-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:20px;box-shadow:var(--glass-shadow);padding:20px;border-left:none;transition:transform .3s,box-shadow .3s,background .3s;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:20px 20px 0 0;pointer-events:none}
.kpi-card:nth-child(1)::before{background:linear-gradient(90deg,#5BA8FF,#38D9F5)}
.kpi-card:nth-child(2)::before{background:linear-gradient(90deg,#34D399,#5BA8FF)}
.kpi-card:nth-child(3)::before{background:linear-gradient(90deg,#A78BFA,#5BA8FF)}
.kpi-card:nth-child(4)::before{background:linear-gradient(90deg,#FBBF24,#F97316)}
.kpi-card:nth-child(5)::before{background:linear-gradient(90deg,#F472B6,#A78BFA)}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--glass-shadow-hover);background:var(--glass-bg-hover)}
.kpi-label{font-size:12px;color:var(--text-secondary);font-weight:600;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;color:var(--text-primary);line-height:1.2}
.kpi-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:none;background:rgba(255,255,255,0.05);border:1px solid var(--border-subtle);border-radius:10px;padding:4px}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;border-bottom:none;border-radius:7px;transition:all .2s}
.tab-btn.active{color:#fff;background:linear-gradient(135deg,rgba(46,110,181,0.6),rgba(91,168,255,0.4));box-shadow:inset 0 1px 0 rgba(255,255,255,0.15)}
.tab-btn:hover:not(.active){color:var(--text-primary);background:rgba(255,255,255,0.05)}
.tab-content{display:none}
.tab-content.active{display:block}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{background:rgba(255,255,255,0.05);padding:10px 12px;text-align:left;font-weight:700;color:var(--accent-cyan);border-bottom:1px solid var(--border-subtle);white-space:nowrap}
.data-table th.c,.data-table td.c{text-align:center}
.data-table th.r,.data-table td.r{text-align:right}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-primary)}
.data-table tbody tr:hover{background:rgba(255,255,255,0.05)}
.data-table tbody tr.total-row{font-weight:700;background:rgba(255,255,255,0.05);border-top:1px solid var(--border-subtle)}
/* HEATMAP */
.hm{padding:4px 8px;border-radius:4px;text-align:center;font-weight:600;font-size:12px;display:inline-block;min-width:54px}
.hm-g{background:rgba(52,211,153,0.2);color:#34D399}
.hm-r{background:rgba(91,168,255,0.15);color:#5BA8FF}
.hm-o{background:rgba(251,191,36,0.18);color:#FBBF24}
.hm-x{background:rgba(255,255,255,0.06);color:var(--text-muted)}
/* GAUGE */
.gauge{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;position:relative;margin-top:6px}
.gauge-fill{height:100%;border-radius:4px;transition:width .6s}
.gauge-target{position:absolute;top:-4px;width:2px;height:16px;background:var(--accent-cyan);border-radius:1px}
/* STATUS */
.st{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.st-ok{background:rgba(52,211,153,0.2);color:#34D399}
.st-warn{background:rgba(251,191,36,0.2);color:#FBBF24}
.st-bad{background:rgba(91,168,255,0.15);color:#5BA8FF}
/* REVENUE */
.rv-pos{color:#34D399;font-weight:700}
.rv-neg{color:#F87171;font-weight:700}
.rv-summary{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(255,255,255,0.05);border-radius:8px;margin-top:16px;border:1px solid var(--border-subtle)}
.rv-summary .lbl{font-weight:700;min-width:80px;font-size:12px;color:var(--text-secondary)}
.rv-summary .amt{font-size:22px;font-weight:800}
.rv-summary .diff{font-size:14px;font-weight:700;margin-left:12px}
/* CHART */
.chart-container{position:relative;width:100%}
.chart-container canvas{width:100%!important}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center .amt{font-size:18px;font-weight:800;color:var(--text-primary)}
.donut-center .lbl{font-size:11px;color:var(--text-secondary)}
/* ROOMI */
.roomi-card{border-left:none;border-top:2px solid var(--accent-blue)}
.roomi-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.roomi-avatar{width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;box-shadow:0 4px 16px rgba(91,168,255,0.3);border:2px solid var(--glass-border)}
.roomi-avatar img{width:100%;height:100%;object-fit:cover}
.roomi-hdr-text h3{font-size:16px;color:var(--text-primary)}
.roomi-hdr-text p{font-size:12px;color:var(--text-secondary)}
.roomi-body{font-size:13px;line-height:1.8;color:var(--text-primary)}
.roomi-body p{margin-bottom:10px}
.roomi-body strong{color:var(--accent-blue)}
.roomi-body em{color:var(--accent-cyan);font-style:normal;font-weight:600}
/* RECS */
.rec-list{display:flex;flex-direction:column;gap:10px}
.rec-item{display:flex;gap:12px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;align-items:flex-start;border:1px solid var(--border-subtle)}
.rec-num{width:26px;height:26px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rec-body{flex:1}
.rec-title{font-weight:700;font-size:13px;margin-bottom:2px;color:var(--text-primary)}
.rec-desc{font-size:12px;color:var(--text-secondary)}
.rec-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.rec-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.rec-tag.eff{background:rgba(52,211,153,0.18);color:#34D399}
.rec-tag.dif{background:rgba(91,168,255,0.15);color:#5BA8FF}
.rec-tag.rsk{background:rgba(251,191,36,0.18);color:#FBBF24}
/* ROADMAP */
.roadmap{display:flex;flex-direction:column;gap:20px}
.rm-phase{position:relative;padding-left:24px}
.rm-phase::before{content:'';position:absolute;left:7px;top:28px;bottom:-20px;width:2px;background:rgba(255,255,255,0.08)}
.rm-phase:last-child::before{display:none}
.rm-dot{width:16px;height:16px;border-radius:50%;position:absolute;left:0;top:3px}
.rm-phase:nth-child(1) .rm-dot{background:var(--accent-blue);box-shadow:0 0 10px rgba(91,168,255,0.4)}
.rm-phase:nth-child(2) .rm-dot{background:var(--accent-cyan);box-shadow:0 0 10px rgba(56,217,245,0.4)}
.rm-phase:nth-child(3) .rm-dot{background:var(--accent-purple);box-shadow:0 0 10px rgba(167,139,250,0.4)}
.rm-title{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--text-primary)}
.rm-items{list-style:none;display:flex;flex-direction:column;gap:4px}
.rm-items li{font-size:12px;color:var(--text-secondary);padding-left:16px;position:relative}
.rm-items li::before{content:'—';position:absolute;left:0;color:var(--text-muted)}
/* RISK */
.risk-list{display:flex;flex-direction:column;gap:12px}
.risk-item{padding:12px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border-subtle)}
.risk-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.risk-name{font-weight:700;font-size:13px;color:var(--text-primary)}
.risk-lv{font-size:11px;padding:2px 10px;border-radius:12px;font-weight:700}
.risk-lv.high,.risk-lv.very-high{background:rgba(248,113,113,0.2);color:#F87171}
.risk-lv.medium{background:rgba(91,168,255,0.2);color:#5BA8FF}
.risk-lv.low{background:rgba(52,211,153,0.2);color:#34D399}
.risk-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.risk-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.risk-detail{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-top:4px}
/* CATEGORY */
.cat{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;background:rgba(91,168,255,0.15);color:#5BA8FF}
.cat-심장{background:rgba(248,113,113,0.18);color:#F87171}
/* LOGIN */
#loginOverlay{position:fixed;inset:0;background:#060B18;z-index:9999;display:flex;align-items:center;justify-content:center}
#loginOverlay::before{content:'';position:fixed;top:-20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(91,168,255,0.18) 0%,transparent 70%);border-radius:50%;animation:blobFloat 12s ease-in-out infinite;pointer-events:none}
#loginOverlay::after{content:'';position:fixed;bottom:-15%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(56,217,245,0.12) 0%,transparent 70%);border-radius:50%;animation:blobFloat 15s ease-in-out infinite reverse;pointer-events:none}
.login-box{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:24px;box-shadow:var(--glass-shadow);padding:48px 40px;width:360px;max-width:90vw;position:relative;z-index:1;text-align:center}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);border-radius:24px 24px 0 0;pointer-events:none}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin:0 auto 20px}
.login-title{font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-secondary);margin-bottom:32px}
.login-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.07);border:1px solid var(--glass-border);border-radius:12px;color:var(--text-primary);font-size:22px;font-weight:700;text-align:center;letter-spacing:6px;outline:none;transition:border .2s,background .2s;-webkit-text-security:disc}
.login-input:focus{border-color:var(--accent-blue);background:rgba(91,168,255,0.1)}
.login-input::placeholder{letter-spacing:0;font-size:14px;font-weight:400;color:var(--text-muted)}
.login-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,rgba(91,168,255,0.5),rgba(56,217,245,0.35));border:1px solid rgba(91,168,255,0.4);border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.login-btn:hover{background:linear-gradient(135deg,rgba(91,168,255,0.7),rgba(56,217,245,0.5));transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-err{margin-top:12px;font-size:13px;color:#F87171;min-height:18px;transition:opacity .2s}
.cat-감염{background:rgba(52,211,153,0.18);color:#34D399}
.cat-신경{background:rgba(167,139,250,0.18);color:#A78BFA}
.cat-응고{background:rgba(251,191,36,0.18);color:#FBBF24}
.cat-모니터링{background:rgba(255,255,255,0.1);color:var(--text-secondary)}
.cat-생화학{background:rgba(56,217,245,0.18);color:#38D9F5}
/* ANIM */
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.25)}
/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:1024px){
  .kpi-cards{grid-template-columns:repeat(3,1fr)}
  .row-2,.row-7-5{grid-template-columns:1fr}
  .dashboard{padding:16px}
  .row{gap:16px}
}
@media (max-width:768px){
  html{font-size:13px}
  /* HEADER */
  .header{height:auto;flex-wrap:wrap;padding:12px 16px;gap:8px}
  .header-logo{font-size:15px;order:1}
  .header-logo span{display:none}
  .hospital-switch{order:2}
  .hospital-switch button{padding:6px 18px;font-size:13px}
  .header-period{order:3;width:100%;text-align:center;font-size:11px;padding-top:4px;border-top:1px solid var(--border-subtle)}
  /* LAYOUT */
  .dashboard{padding:12px;gap:14px}
  .row{gap:14px}
  .row-2,.row-7-5{grid-template-columns:1fr}
  /* KPI */
  .kpi-cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .kpi-card{padding:14px;border-radius:14px}
  .kpi-value{font-size:22px}
  .kpi-sub{font-size:11px}
  /* CARD */
  .card{padding:16px;border-radius:14px}
  .card-title{font-size:12px;margin-bottom:12px;padding-bottom:10px}
  /* TABS */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;gap:2px;padding:3px}
  .tab-btn{padding:7px 12px;font-size:12px;white-space:nowrap;flex-shrink:0}
  /* TABLE */
  .data-table{font-size:12px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
  .data-table thead th{padding:8px 10px;font-size:11px}
  .data-table tbody td{padding:8px 10px}
  /* REVENUE */
  .rv-summary{flex-direction:column;align-items:flex-start;gap:8px;padding:12px}
  .rv-summary .amt{font-size:18px}
  .rv-summary .diff{margin-left:0}
  /* ROOMI */
  .roomi-hdr{gap:10px}
  .roomi-avatar{width:40px;height:40px;border-radius:10px}
  .roomi-hdr-text h3{font-size:14px}
  .roomi-body{font-size:12px;line-height:1.7}
  /* RECS */
  .rec-item{padding:10px;gap:10px}
  .rec-num{width:22px;height:22px;font-size:11px}
  .rec-title{font-size:12px}
  .rec-desc{font-size:11px}
  .rec-meta{gap:4px}
  .rec-tag{font-size:9px;padding:2px 6px}
  /* RISK */
  .risk-item{padding:10px}
  .risk-name{font-size:12px}
  /* ROADMAP */
  .rm-title{font-size:12px}
  .rm-items li{font-size:11px}
  /* BLOB smaller on mobile */
  body::before{width:300px;height:300px}
  body::after{width:250px;height:250px}
}
@media (max-width:480px){
  html{font-size:12px}
  .header{padding:10px 12px}
  .logo-icon{width:28px;height:28px;font-size:12px;border-radius:6px}
  .hospital-switch button{padding:5px 14px;font-size:12px}
  .dashboard{padding:10px;gap:12px}
  .kpi-cards{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-card{padding:12px;border-radius:12px}
  .kpi-value{font-size:20px}
  .card{padding:14px;border-radius:12px}
  .tabs{padding:2px}
  .tab-btn{padding:6px 10px;font-size:11px}
  .rv-summary .amt{font-size:16px}
  .roomi-avatar{width:36px;height:36px}
  .roomi-hdr-text h3{font-size:13px}
  .roomi-body{font-size:11px;line-height:1.65}
  body::before{width:200px;height:200px;opacity:0.7}
  body::after{width:180px;height:180px;opacity:0.7}
}
</style>
<style>
/* Inline grid overrides for JS-rendered content */
@media (max-width:768px){
  #roomiSummaryTab [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  #testSetsTab [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
}
@media (max-width:480px){
  #roomiSummaryTab [style*="grid-template-columns:repeat(2"]{grid-template-columns:1fr 1fr!important}
  #testSetsTab [style*="grid-template-columns:repeat(2"]{grid-template-columns:1fr 1fr!important}
}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">EM</div>

let H = 'daejeon'; // current hospital

/* =============== UTILS =============== */
const fmt = n => n == null ? '-' : n.toLocaleString('ko-KR');
const fmtW = n => {
  if (Math.abs(n) >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (Math.abs(n) >= 1e4) return (n/1e4).toFixed(0) + '만';
  return fmt(n);
};
const fmtPct = n => n == null ? '-' : n.toFixed(1) + '%';
const h = D[H]; // alias, refreshed on switch

function hmClass(val, ktas) {
  const target = D[H].kpi[ktas];
  if (val == null) return 'hm hm-x';
  if (ktas === 5) return val <= target ? 'hm hm-g' : 'hm hm-o'; // 5등급은 '이하' 기준
  if (val >= target) return 'hm hm-g';
  return 'hm hm-r';
}
function riskLvClass(lv) {
  if (lv.includes('매우')) return 'risk-lv very-high';
  if (lv === '높음') return 'risk-lv high';
  if (lv === '중간') return 'risk-lv medium';
  return 'risk-lv low';
}
function riskBarColor(pct) {
  if (pct >= 70) return '#F87171';
  if (pct >= 40) return '#FBBF24';
  return '#34D399';
}

function renderDoctorRate() {

  let rows = '';
  for (let k=1; k<=5; k++) {

    const diff = r.c - r.k;
    rows += `<tr><td class="bold c" style="color:${D.kc[k]}">KTAS ${k}</td>
      <td class="r">${fmt(r.c)}원${sub(r.c)}</td>

  document.getElementById('revenueTable').innerHTML = `<table class="data-table"><thead><tr><th class="c">KTAS</th><th class="r">현재 수익</th><th class="r">KPI 기준선</th><th class="r">차액</th></tr></thead><tbody>${rows}</tbody></table>`;

        <div class="${cls}" style="font-size:13px">${sign}${fmtW(diff)}원 (${sign}${pct}%)</div>
      </div>
      <div style="margin-bottom:6px">현재 수익: ${fmtW(t.c)}원 <span style="color:#4ADE80">(월 ${fmt(Math.round(t.c/6))}원)</span></div>
      <div style="height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin-bottom:4px;position:relative">
        <div style="height:100%;width:${barC}%;background:linear-gradient(90deg,#2E6EB5,#5BA8FF);border-radius:4px"></div>
      </div>
      <div style="margin-bottom:6px">KPI 기준선: ${fmtW(t.k)}원 <span style="color:#4ADE80">(월 ${fmt(Math.round(t.k/6))}원)</span></div>
      <div style="height:8px;background:rgba(255,255,255,0.1);border-radius:4px;position:relative">
        <div style="height:100%;width:${barK}%;background:rgba(255,255,255,0.15);border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('revenueInfoPanel').innerHTML = html;
}

function renderAdditionalTests() {
  const tests = D[H].addTests;
  const maxCnt = tests[0]?.cnt || 1;
  let rows = tests.map((t,i) => `<tr>
    <td class="c">${i+1}</td><td style="font-size:11px;color:rgba(255,255,255,0.5)">${t.cd}</td><td>${t.nm}</td>
    <td class="r">${fmt(t.cnt)}</td><td class="r">${fmt(t.pt)}</td>
    <td><div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;width:100%"><div style="height:100%;width:${t.cnt/maxCnt*100}%;background:linear-gradient(90deg,#2E6EB5,#5BA8FF);border-radius:3px"></div></div></td>
    <td class="c"><span class="cat cat-${t.cat}">${t.cat}</span></td></tr>`).join('');
  document.getElementById('testAdditionalTab').innerHTML = `<table class="data-table"><thead><tr><th class="c">#</th><th>수가코드</th><th>수가명</th><th class="r">처방건수</th><th class="r">환자수</th><th style="min-width:120px">빈도</th><th class="c">카테고리</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderLowFreqTests() {
  const tests = D[H].lowTests;
  let rows = tests.map(t => `<tr><td style="font-size:11px;color:rgba(255,255,255,0.5)">${t.cd}</td><td>${t.nm}</td><td class="r">${t.cnt}건</td><td class="r">${fmt(t.up)}원</td><td class="r">${fmt(t.t)}원</td></tr>`).join('');
  document.getElementById('testLowfreqTab').innerHTML = `<table class="data-table"><thead><tr><th>수가코드</th><th>수가명</th><th class="r">처방건수</th><th class="r">단가</th><th class="r">총금액</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderTestSets() {
  const ss = D.sets;
  const allAdmItems = [...D.boldSurgery, ...D.boldElderly];
  const admItems = H === 'daejeon' ? allAdmItems.filter(i => i.cd !== 'L2043') : allAdmItems;
  const boldGroups = [{title:'입원시 추가 처방 항목', items: admItems}];
  const renderGroup = (g) => {
    const total = g.items.reduce((s,i)=>s+i.price,0);
    return `<div style="margin-bottom:16px"><div style="font-weight:700;font-size:13px;color:rgba(255,255,255,0.9);margin-bottom:8px;padding:8px 12px;background:rgba(91,168,255,0.08);border-radius:6px;display:flex;justify-content:space-between"><span>${g.title}</span><span style="color:#5BA8FF">${g.items.length}개 항목 · 합계 ${fmt(total)}원</span></div>
    <table class="data-table"><thead><tr><th>수가코드</th><th>수가명</th><th class="r">단가</th></tr></thead><tbody>${g.items.map(i=>`<tr><td style="font-size:11px;color:rgba(255,255,255,0.5)">${i.cd}</td><td><strong>${i.nm}</strong></td><td class="r">${fmt(i.price)}원</td></tr>`).join('')}</tbody></table></div>`;
  };
  document.getElementById('testSetsTab').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
      ${Object.values(ss).map(s => `<div style="padding:20px;background:rgba(255,255,255,0.05);border-radius:8px;text-align:center">
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px">${s.l}</div>
        <div style="font-size:22px;font-weight:800;color:rgba(255,255,255,0.9)">${fmt(s.c)}<span style="font-size:12px">원</span></div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px">${s.n}개 항목</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:20px">
      <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08)">📋 입원시 추가처방 검사 항목 (굵은글씨 지정)</div>
      ${boldGroups.map(g => renderGroup(g)).join('')}
    </div>
    <div style="margin-top:16px;padding:12px;background:rgba(91,168,255,0.1);border-radius:8px;font-size:12px;color:#5BA8FF;border:1px solid rgba(91,168,255,0.15)">
      <strong>입원시 추가 패키지:</strong> 기본lab(${fmt(D[H].price.out)}원, 48항목)에 입원시 추가 항목을 더한 ${fmt(D[H].price.adm)}원 기준 적용.
    </div>`;
}

function renderROOMi() {
  const rm = D[H].roomi;
  const s = D[H].s;
  const kt = D[H].ktas;
  const em = D[H].em;
  // KTAS 3 수익 비중
  const k3pct = (kt[3].tr / s.totalRevenue * 100).toFixed(1);
  // KTAS별 처방율 vs KPI 미니 게이지
  const miniGauge = (label, color, rate, kpi) => {
    const over = rate > kpi * 1.2;
    const barColor = rate >= kpi ? (over ? '#FBBF24' : '#34D399') : '#F87171';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:56px;font-size:11px;font-weight:700;color:${color}">KTAS ${label}</div>
      <div style="flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;position:relative">
        <div style="height:100%;width:${Math.min(rate,100)}%;background:${barColor};border-radius:3px"></div>
        <div style="position:absolute;top:-3px;left:${kpi}%;width:2px;height:12px;background:rgba(255,255,255,0.6);border-radius:1px"></div>
      </div>
      <div style="width:42px;font-size:11px;font-weight:600;text-align:right">${rate.toFixed(1)}%</div>
    </div>`;
  };
  const infographic = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    <div style="padding:14px;background:rgba(91,168,255,0.08);border-radius:8px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">총 내원건수</div>
      <div style="font-size:20px;font-weight:800;color:rgba(255,255,255,0.9)">${fmt(s.totalVisits)}<span style="font-size:11px">건</span></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">월평균 ${fmt(Math.round(s.totalVisits/6))}건</div>
    </div>
    <div style="padding:14px;background:rgba(91,168,255,0.08);border-radius:8px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">기본lab 처방율</div>
      <div style="font-size:20px;font-weight:800;color:#5BA8FF">${s.labRate}%</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">EM 의사 ${s.docs}명</div>
    </div>
    <div style="padding:14px;background:rgba(91,168,255,0.08);border-radius:8px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">내원건당 평균금액</div>
      <div style="font-size:20px;font-weight:800;color:rgba(255,255,255,0.9)">${fmt(s.avgRev)}<span style="font-size:11px">원</span></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">총 ${fmtW(s.totalRevenue)}원</div>
    </div>
    <div style="padding:14px;background:rgba(91,168,255,0.08);border-radius:8px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">입원율</div>
      <div style="font-size:20px;font-weight:800;color:#A78BFA">${s.admRate}%</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">KTAS 3 수익비중 ${k3pct}%</div>
    </div>
  </div>
  <div style="padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:16px">
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:8px">KTAS 등급별 처방율 vs KPI <span style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:400">(| = KPI 목표)</span></div>
    ${[1,2,3,4,5].map(k => miniGauge(k, D.kc[k], em[k].lr, D[H].kpi[k])).join('')}
  </div>`;
  document.getElementById('roomiHospital').textContent = D[H].name;
  document.getElementById('roomiSummaryTab').innerHTML = infographic + `<div class="roomi-body">${rm.sum}</div>`;
  document.getElementById('roomiRecsTab').innerHTML = `<div class="rec-list">${rm.recs.map(r => `
    <div class="rec-item"><div class="rec-num">${r.p}</div><div class="rec-body">
      <div class="rec-title">${r.t}</div><div class="rec-desc">${r.desc}</div>
      <div class="rec-meta"><span class="rec-tag eff">${r.e}</span><span class="rec-tag dif">난이도: ${r.d}</span><span class="rec-tag rsk">리스크: ${r.r}</span></div>
    </div></div>`).join('')}</div>`;
  const phases = [rm.rm.p1, rm.rm.p2, rm.rm.p3];
  document.getElementById('roomiRoadmapTab').innerHTML = `<div class="roadmap">${phases.map(p => `
    <div class="rm-phase"><div class="rm-dot"></div><div class="rm-title">${p.t}</div>
      <ul class="rm-items">${p.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`).join('')}</div>`;
}

function renderRisks() {
  const risks = D[H].roomi.risks;
  document.getElementById('riskPanel').innerHTML = `<div class="risk-list">${risks.map(r => `
    <div class="risk-item"><div class="risk-hdr"><div class="risk-name">${r.n}</div><div class="${riskLvClass(r.lv)}">${r.lv}</div></div>
      <div class="risk-bar"><div class="risk-bar-fill" style="width:${r.pct}%;background:${riskBarColor(r.pct)}"></div></div>
      <div class="risk-detail"><span>${r.cur}</span><span>예상 삭감: ${r.amt}</span></div></div>`).join('')}</div>`;
  document.getElementById('benchmarkDoctor').textContent = D[H].roomi.bench;
}

/* =============== TAB SWITCHING =============== */
function switchDoctorTab(tab, btn) {
  document.querySelectorAll('#doctorRateTab,#doctorRevenueTab,#doctorKpiTab').forEach(el => el.classList.remove('active'));
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'rate') { document.getElementById('doctorRateTab').classList.add('active'); }
  else if (tab === 'revenue') { document.getElementById('doctorRevenueTab').classList.add('active'); }
  else { document.getElementById('doctorKpiTab').classList.add('active'); renderDoctorKpi(); }
}

function switchRevenueTab(scenario, btn) {
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRevenue(scenario);
}

function switchTestTab(tab, btn) {
  document.querySelectorAll('#testAdditionalTab,#testLowfreqTab,#testSetsTab').forEach(el => el.classList.remove('active'));
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'additional') document.getElementById('testAdditionalTab').classList.add('active');
  else if (tab === 'lowfreq') document.getElementById('testLowfreqTab').classList.add('active');
  else document.getElementById('testSetsTab').classList.add('active');
}

function switchRoomiTab(tab, btn) {
  document.querySelectorAll('#roomiSummaryTab,#roomiRecsTab,#roomiRoadmapTab').forEach(el => el.classList.remove('active'));
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'summary') document.getElementById('roomiSummaryTab').classList.add('active');
  else if (tab === 'recs') document.getElementById('roomiRecsTab').classList.add('active');
  else document.getElementById('roomiRoadmapTab').classList.add('active');
}

/* =============== HOSPITAL SWITCH =============== */
function switchHospital(key) {
  H = key;
  document.querySelectorAll('.hospital-switch button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.hospital-switch button').forEach(b => { if ((key==='daejeon'&&b.textContent.includes('대전'))||(key==='yuseong'&&b.textContent.includes('유성'))) b.classList.add('active'); });
  document.getElementById('headerPeriod').textContent = D[H].period + ' (6개월)';
  document.querySelector('.dashboard').classList.add('fade-in');
  renderAll();
  setTimeout(() => document.querySelector('.dashboard').classList.remove('fade-in'), 300);
}

function renderAll() {
  renderKPI();
  renderDoctorRate();
  renderDoctorRevenue();
  if (document.getElementById('doctorKpiTab').classList.contains('active')) renderDoctorKpi();
  renderRevenue();
  renderRevenueInfo();
  renderAdditionalTests();
  renderLowFreqTests();
  renderTestSets();
  renderROOMi();
  renderRisks();
}

/* =============== LOGIN =============== */
const VALID_IDS = ['14470', '17548'];
function doLogin() {
  const val = document.getElementById('loginInput').value.trim();
  if (VALID_IDS.includes(val)) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('loginInput').value = '';
  } else {
    const err = document.getElementById('loginErr');
    err.textContent = '사번이 올바르지 않습니다.';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}

/* =============== INIT =============== */
document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  document.getElementById('loginInput').focus();
});
</script>
</body>
</html>
